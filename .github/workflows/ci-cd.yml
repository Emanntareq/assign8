name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # Checkout code from the repository
      - name: Checkout code
        uses: actions/checkout@v2

      # Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Docker image without pushing it to Docker Hub yet
      - name: Build Docker image (without pushing)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false

      # Check if the Docker container is running (debugging step)
      - name: Check if container is running
        run: |
          docker ps

      # Run the smoke test: verify if the app is working
      - name: Run smoke test
        run: |
          docker run -d -p 5001:5000 --env-file .env --name quiz-ai devops-quiz-ai
          sleep 5 # Wait for the container to fully start
          curl --fail http://localhost:5000/api/health || exit 1

      # Push Docker image to Docker Hub (only if previous steps are successful)
      - name: Push Docker image to Docker Hub
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true

  deploy:
    needs: build-test-push
    runs-on: ubuntu-latest
    steps:
      # Deploy to Render or another environment
      - name: Deploy to Render
        run: |
          # Your deployment script or commands go here
          echo "Deploying to Render..."
